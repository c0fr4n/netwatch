function exportOfflineExcel(offlineScreens) {
  if (!window.XLSX) { alert('Librería Excel no disponible'); return; }
  const XLSX = window.XLSX;
  const now = new Date();
  const fechaStr = now.toLocaleString('es-CL', {
    timeZone: 'America/Santiago', dateStyle: 'short', timeStyle: 'short'
  });

  const rows = offlineScreens.map(s => ({
    'Nombre':    s.name,
    'Grupo':     s.loc  || '—',
    'Estado':    'Offline',
    'IP':        s.ip   || '—',
    'MAC':       s.mac  || '—',
    'Modelo':    s.model|| '—',
    'Servidor':  s.server === 'bosque' ? 'Bosque' : 'Callecalle',
    'Generado':  fechaStr,
  }));

  const ws = XLSX.utils.json_to_sheet(rows);

  // Ancho de columnas
  ws['!cols'] = [
    { wch: 32 }, { wch: 28 }, { wch: 10 }, { wch: 16 },
    { wch: 20 }, { wch: 18 }, { wch: 12 }, { wch: 20 },
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Offline');

  const dateTag = now.toISOString().slice(0,10);
  XLSX.writeFile(wb, `netwatch-offline-${dateTag}.xlsx`);
}

// ──────────────────────────────────────────────────────────────
// Excel export — Inventario completo (3 hojas)
// ──────────────────────────────────────────────────────────────
function exportExcel(allScreensData) {
  if (!window.XLSX) { alert('Librería Excel no disponible'); return; }
  const XLSX = window.XLSX;

  const tipoLabel = t => ({ propia: 'Adm. Propia', franquicia: 'Franquicia', sin_clasificar: 'Sin clasificar' }[t] || 'Sin clasificar');
  const srvLabel  = s => s === 'bosque' ? 'Bosque' : 'Callecalle';

  function exclusionLabel(s) {
    if (s.groupExcluded)  return 'Excluida por grupo';
    if (s.manualExcluded) return 'Excluida manual';
    if (s.brandChange)    return 'Cambio de marca';
    return 'Activa';
  }

  function codigoTienda(name) {
    const m = (name || '').match(/^(\d+)/);
    return m ? m[1] : '—';
  }

  // Todas las pantallas de ambos servidores sin ningún filtro
  const allScreens = [
    ...(allScreensData.bosque     || []),
    ...(allScreensData.callecalle || []),
  ];

  // ── Hoja 1: Inventario Completo ──────────────────────────────
  const h1cols = ['Código Tienda','Tipo','Nombre','Grupo completo','Servidor','Estado','IP','MAC','Modelo','Exclusión'];
  const h1rows = allScreens.map(s => ({
    'Código Tienda': codigoTienda(s.name),
    'Tipo':          tipoLabel(s.tipoTienda),
    'Nombre':        s.name,
    'Grupo completo':s.loc,
    'Servidor':      srvLabel(s.server),
    'Estado':        s.state === 'online' ? 'Online' : 'Offline',
    'IP':            s.ip,
    'MAC':           s.mac,
    'Modelo':        s.model,
    'Exclusión':     exclusionLabel(s),
  }));
  const ws1 = XLSX.utils.json_to_sheet(h1rows, { header: h1cols });
  ws1['!cols'] = [8,16,32,40,12,10,16,20,14,20].map(w => ({ wch: w }));

  // ── Hoja 2: Resumen por Servidor ─────────────────────────────
  function serverStats(screens) {
    const total   = screens.length;
    const online  = screens.filter(s => s.state === 'online').length;
    const offline = screens.filter(s => s.state === 'offline').length;
    const pct     = total > 0 ? (online / total * 100).toFixed(1) + '%' : '—';
    const propia  = screens.filter(s => s.tipoTienda === 'propia').length;
    const franq   = screens.filter(s => s.tipoTienda === 'franquicia').length;
    const excl    = screens.filter(s => s.groupExcluded || s.manualExcluded || s.brandChange).length;
    return { total, online, offline, pct, propia, franq, excl };
  }
  const bStats = serverStats(allScreensData.bosque     || []);
  const cStats = serverStats(allScreensData.callecalle || []);
  const tStats = serverStats(allScreens);
  const h2cols = ['Servidor','Total pantallas','Online','Offline','% Disponibilidad','Adm. Propia','Franquicia','Excluidas'];
  const h2rows = [
    { 'Servidor':'Bosque',    'Total pantallas':bStats.total, 'Online':bStats.online, 'Offline':bStats.offline, '% Disponibilidad':bStats.pct, 'Adm. Propia':bStats.propia, 'Franquicia':bStats.franq, 'Excluidas':bStats.excl },
    { 'Servidor':'Callecalle','Total pantallas':cStats.total, 'Online':cStats.online, 'Offline':cStats.offline, '% Disponibilidad':cStats.pct, 'Adm. Propia':cStats.propia, 'Franquicia':cStats.franq, 'Excluidas':cStats.excl },
    { 'Servidor':'Total',     'Total pantallas':tStats.total, 'Online':tStats.online, 'Offline':tStats.offline, '% Disponibilidad':tStats.pct, 'Adm. Propia':tStats.propia, 'Franquicia':tStats.franq, 'Excluidas':tStats.excl },
  ];
  const ws2 = XLSX.utils.json_to_sheet(h2rows, { header: h2cols });
  ws2['!cols'] = [14,16,10,10,18,14,12,12].map(w => ({ wch: w }));

  // ── Hoja 3: Offline Ahora ────────────────────────────────────
  const offlineNow = allScreens.filter(s =>
    s.state === 'offline' && !s.groupExcluded && !s.manualExcluded && !s.brandChange
  );
  const h3rows = offlineNow.map(s => ({
    'Código Tienda': codigoTienda(s.name),
    'Tipo':          tipoLabel(s.tipoTienda),
    'Nombre':        s.name,
    'Grupo completo':s.loc,
    'Servidor':      srvLabel(s.server),
    'Estado':        'Offline',
    'IP':            s.ip,
    'MAC':           s.mac,
    'Modelo':        s.model,
    'Exclusión':     exclusionLabel(s),
  }));
  const ws3 = XLSX.utils.json_to_sheet(h3rows, { header: h1cols });
  ws3['!cols'] = ws1['!cols'];

  // ── Armar workbook ───────────────────────────────────────────
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws1, 'Inventario Completo');
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen por Servidor');
  XLSX.utils.book_append_sheet(wb, ws3, 'Offline Ahora');

  XLSX.writeFile(wb, `netwatch_inventario_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ──────────────────────────────────────────────────────────────
// PDF export
// ──────────────────────────────────────────────────────────────
async function exportScreensPDF(filtered, chartsRef) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const now = new Date().toLocaleString('es-CL', { timeZone: 'America/Santiago' });
  const pageW = doc.internal.pageSize.getWidth();

  // Header
  doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('NetWatch · MagicInfo Display Monitor', 14, 16);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100);
  doc.text(`Generado: ${now}  ·  ${filtered.length} pantallas`, 14, 22);
  doc.setTextColor(0);

  // Charts via html2canvas
  let chartY = 28;
  if (chartsRef && chartsRef.current) {
    try {
      const canvas = await html2canvas(chartsRef.current, { scale: 2, backgroundColor: '#ffffff' });
      const imgData = canvas.toDataURL('image/png');
      const ratio = canvas.height / canvas.width;
      const imgW = pageW * 0.45;
      const imgH = imgW * ratio;
      doc.addImage(imgData, 'PNG', 14, chartY, imgW, imgH);
      chartY += imgH + 6;
    } catch(e) { console.warn('html2canvas error:', e); }
  }

  const tipoLabel = t => ({ propia: 'Adm. Propia', franquicia: 'Franquicia', sin_clasificar: 'Sin clasificar' }[t] || '—');

  // Table
  doc.autoTable({
    startY: chartY,
    head: [['Nombre','Grupo','Estado','IP','Modelo','Servidor','Tipo']],
    body: filtered.map(s => [
      s.name, s.loc, s.state.toUpperCase(), s.ip, s.model,
      s.server === 'bosque' ? 'Bosque' : 'Callecalle',
      tipoLabel(s.tipoTienda),
    ]),
    styles: { fontSize: 7, cellPadding: 2 },
    headStyles: { fillColor: [45, 53, 64], textColor: 255, fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [248, 249, 251] },
    columnStyles: {
      0: { cellWidth: 48 }, 1: { cellWidth: 48 }, 2: { cellWidth: 18 },
      3: { cellWidth: 26 }, 4: { cellWidth: 20 }, 5: { cellWidth: 20 },
      6: { cellWidth: 22 },
    },
    didParseCell(data) {
      if (data.section !== 'body') return;
      if (data.column.index === 2) {
        data.cell.styles.textColor = data.cell.raw === 'OFFLINE' ? [220,79,79] : [22,163,74];
        data.cell.styles.fontStyle = 'bold';
      }
      if (data.column.index === 6) {
        data.cell.styles.textColor =
          data.cell.raw === 'Adm. Propia' ? [30,64,175] :
          data.cell.raw === 'Franquicia'  ? [146,64,14] : [156,163,175];
        data.cell.styles.fontStyle = 'bold';
      }
    },
  });

  const pad = n => String(n).padStart(2,'0');
  const d = new Date();
  const fname = `netwatch_screens_${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}.pdf`;
  doc.save(fname);
}

// ──────────────────────────────────────────────────────────────
// ScreensView
// ──────────────────────────────────────────────────────────────
function ScreensView({ screens, allScreensData, showExcluded, setShowExcluded, showBrandChange, setShowBrandChange, search, layout, online, offline, total }) {
  const bosqueAll       = allScreensData?.bosque     || [];
  const callecalleAll   = allScreensData?.callecalle || [];
  const bosqueActive    = bosqueAll.filter(s => !s.groupExcluded && !s.manualExcluded && !s.brandChange);
  const bosqueExcGroup  = bosqueAll.filter(s => s.groupExcluded);
  const bosqueExcManual = bosqueAll.filter(s => s.manualExcluded && !s.groupExcluded);
  const totalExcluded   = bosqueExcGroup.length + bosqueExcManual.length;
  const excludedScreens = bosqueAll.filter(s => s.groupExcluded || s.manualExcluded);
  const bosqueBrandChange = bosqueAll.filter(s => s.brandChange);
  const [pending, setPending] = useState(null);

  // Tabla dinámica: filtros + orden
  const [filterState,  setFilterState]  = useState('todos');
  const [filterServer, setFilterServer] = useState('ambos');
  const [filterTipo,   setFilterTipo]   = useState('todos');
  const [tableSearch,  setTableSearch]  = useState(search || '');
  const [sortCol,      setSortCol]      = useState('name');
  const [sortDir,      setSortDir]      = useState('asc');
  const chartsRef = useRef(null);

  // Sincronizar búsqueda global → local
  useEffect(() => { setTableSearch(search || ''); }, [search]);

  const allActive = useMemo(() => {
    const b = bosqueActive.map(s => ({ ...s, server: s.server || 'bosque' }));
    const c = callecalleAll.map(s => ({ ...s, server: s.server || 'callecalle' }));
    return [...b, ...c];
  }, [bosqueActive, callecalleAll]);

  const filtered = useMemo(() => {
    const q = tableSearch.trim().toLowerCase();
    let list = allActive;
    if (filterState  !== 'todos') list = list.filter(s => s.state === filterState);
    if (filterServer !== 'ambos') list = list.filter(s => s.server === filterServer);
    if (filterTipo   !== 'todos') list = list.filter(s => s.tipoTienda === filterTipo);
    if (q) list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.loc  || '').toLowerCase().includes(q) ||
      (s.ip   || '').includes(q) ||
      (s.mac  || '').toLowerCase().includes(q)
    );
    return [...list].sort((a, b) => {
      const va = (a[sortCol] || '').toString().toLowerCase();
      const vb = (b[sortCol] || '').toString().toLowerCase();
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }, [allActive, filterState, filterServer, filterTipo, tableSearch, sortCol, sortDir]);

  function toggleSort(col) {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  }
  const sortIcon = col => sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : ' ⇅';

  async function handleExclude(screen) {
    setPending(screen.id);
    await excludeDevice(screen.id);
    window.location.reload();
  }
  async function handleInclude(screen) {
    setPending(screen.id);
    await includeDevice(screen.id);
    window.location.reload();
  }
  async function handleBrandChange(screen) {
    setPending(screen.id);
    await brandChangeDevice(screen.id);
    window.location.reload();
  }
  async function handleUnbrandChange(screen) {
    setPending(screen.id);
    await unbrandChangeDevice(screen.id);
    window.location.reload();
  }

  const bOnline  = bosqueActive.filter(s => s.state === 'online').length;
  const bOffline = bosqueActive.filter(s => s.state === 'offline').length;
  const cOnline  = callecalleAll.filter(s => s.state === 'online').length;
  const cOffline = callecalleAll.filter(s => s.state === 'offline').length;

  const donutEstado = [
    { label: 'Online',  value: bOnline  + cOnline,  color: '#4ade80' },
    { label: 'Offline', value: bOffline + cOffline, color: '#f87171' },
  ];
  const donutServidor = [
    { label: 'Bosque',     value: bosqueActive.length,  color: '#818cf8' },
    { label: 'Callecalle', value: callecalleAll.length, color: '#38bdf8' },
  ];

  const thStyle = col => ({
    padding:'9px 12px', textAlign:'left', color:'#6b7280', fontWeight:600,
    fontSize:11, cursor:'pointer', userSelect:'none', whiteSpace:'nowrap',
    borderBottom:'2px solid #e5e7eb',
    background: sortCol===col ? '#f0f9ff' : 'transparent',
  });

  return (
    <div className="me-view me-view-screens" style={{overflowY:'auto'}}>

      {/* ── Server summary cards ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))',gap:16,padding:'16px 20px 0'}}>
        <ServerSummaryCard label="Bosque"     screens={showExcluded ? bosqueAll : bosqueActive} />
        <ServerSummaryCard label="Callecalle" screens={callecalleAll} />
      </div>

      {/* ── Donuts + Resumen por Servidor ── */}
      <div style={{display:'grid',gridTemplateColumns:'minmax(380px,480px) 1fr',gap:16,padding:'16px 20px 0',alignItems:'stretch'}}>
        <div ref={chartsRef} style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div style={{background:'#fff',border:'1px solid #e4e7ec',borderRadius:8,padding:'16px 20px'}}>
            <MiniDonut data={donutEstado}   title="Por estado" />
          </div>
          <div style={{background:'#fff',border:'1px solid #e4e7ec',borderRadius:8,padding:'16px 20px'}}>
            <MiniDonut data={donutServidor} title="Por servidor" />
          </div>
        </div>
        <ResumenServidorTable bosqueAll={bosqueAll} callecalleAll={callecalleAll} />
      </div>

      {/* ── Toggles de grupos especiales ── */}
      <div style={{padding:'12px 20px 0',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        {/* Excluidas */}
        <button onClick={() => setShowExcluded(v => !v)}
          style={{padding:'5px 14px',fontSize:11,fontWeight:600,borderRadius:20,cursor:'pointer',border:'1.5px solid',
            background:showExcluded?'#fef3c7':'#f9fafb', color:showExcluded?'#92400e':'#6b7280',
            borderColor:showExcluded?'#f59e0b':'#d1d5db'}}>
          {showExcluded ? '✓ Mostrando excluidas' : '○ Mostrar excluidas'}
        </button>
        {totalExcluded > 0 && (
          <span style={{fontSize:11,color:'#9ca3af',marginRight:8}}>
            {totalExcluded} excluida{totalExcluded!==1?'s':''} de Bosque
            &nbsp;({bosqueExcGroup.length} por grupo · {bosqueExcManual.length} manual{bosqueExcManual.length!==1?'es':''})
          </span>
        )}
        {/* Cambio de marca */}
        <button onClick={() => setShowBrandChange(v => !v)}
          style={{padding:'5px 14px',fontSize:11,fontWeight:600,borderRadius:20,cursor:'pointer',border:'1.5px solid',
            background:showBrandChange?'#ede9fe':'#f9fafb', color:showBrandChange?'#5b21b6':'#6b7280',
            borderColor:showBrandChange?'#a78bfa':'#d1d5db'}}>
          {showBrandChange ? '✓ Mostrando cambio de marca' : '○ Mostrar cambio de marca'}
        </button>
        {bosqueBrandChange.length > 0 && (
          <span style={{fontSize:11,color:'#9ca3af'}}>
            {bosqueBrandChange.length} pantalla{bosqueBrandChange.length!==1?'s':''} · Bosque
          </span>
        )}
      </div>

      {/* ── Tabla excluidas ── */}
      {showExcluded && excludedScreens.length > 0 && (
        <div style={{padding:'12px 20px 0'}}>
          <Card title={`Pantallas excluidas · ${excludedScreens.length}`}
            headerRight={<span style={{fontSize:11,color:'#9ca3af'}}>Solo Bosque</span>}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>
                  {['Nombre','Grupo','Estado','IP','Tipo','Acción'].map(h=>(
                    <th key={h} style={{padding:'8px 12px',textAlign:'left',color:'#6b7280',fontWeight:500,fontSize:11}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {excludedScreens.map(s=>(
                    <tr key={s.id} style={{borderBottom:'1px solid #f3f4f6'}}>
                      <td style={{padding:'8px 12px',fontFamily:'monospace',fontSize:11}}>{s.name}</td>
                      <td style={{padding:'8px 12px',color:'#6b7280',fontSize:11}}>{s.loc}</td>
                      <td style={{padding:'8px 12px'}}>
                        <span style={{fontSize:10,padding:'2px 7px',borderRadius:10,
                          background:s.state==='online'?'#dcfce7':'#fee2e2',
                          color:s.state==='online'?'#166534':'#991b1b'}}>{s.state}</span>
                      </td>
                      <td style={{padding:'8px 12px',fontFamily:'monospace',fontSize:11,color:'#6b7280'}}>{s.ip}</td>
                      <td style={{padding:'8px 12px',fontSize:11,color:'#9ca3af'}}>{s.groupExcluded?'Grupo':'Manual'}</td>
                      <td style={{padding:'8px 12px'}}>
                        {s.manualExcluded && !s.groupExcluded ? (
                          <button onClick={()=>handleInclude(s)} disabled={pending===s.id}
                            style={{fontSize:10,padding:'3px 10px',borderRadius:5,cursor:'pointer',
                              border:'1px solid #16a34a',background:'#f0fdf4',color:'#166534',
                              opacity:pending===s.id?0.5:1}}>↩ Reincorporar</button>
                        ) : (
                          <span style={{fontSize:10,color:'#d1d5db'}}>Excluida por grupo</span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}

      {/* ── Tabla cambio de marca ── */}
      {showBrandChange && bosqueBrandChange.length > 0 && (
        <div style={{padding:'12px 20px 0'}}>
          <Card title={`Pantallas "Cambio de marca" · ${bosqueBrandChange.length}`}
            headerRight={<span style={{fontSize:11,color:'#9ca3af'}}>Solo Bosque · fuera de contadores</span>}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead><tr style={{borderBottom:'1px solid #e5e7eb'}}>
                  {['Nombre','Grupo','Estado','IP','Origen','Acción'].map(h=>(
                    <th key={h} style={{padding:'8px 12px',textAlign:'left',color:'#6b7280',fontWeight:500,fontSize:11}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {bosqueBrandChange.map(s=>(
                    <tr key={s.id} style={{borderBottom:'1px solid #f3f4f6'}}>
                      <td style={{padding:'8px 12px',fontFamily:'monospace',fontSize:11}}>{s.name}</td>
                      <td style={{padding:'8px 12px',color:'#6b7280',fontSize:11}}>{s.loc}</td>
                      <td style={{padding:'8px 12px'}}>
                        <span style={{fontSize:10,padding:'2px 7px',borderRadius:10,
                          background:s.state==='online'?'#dcfce7':'#fee2e2',
                          color:s.state==='online'?'#166534':'#991b1b'}}>{s.state}</span>
                      </td>
                      <td style={{padding:'8px 12px',fontFamily:'monospace',fontSize:11,color:'#6b7280'}}>{s.ip}</td>
                      <td style={{padding:'8px 12px',fontSize:11}}>
                        <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,
                          background: s.brandChangeManual ? '#f5f3ff' : '#ede9fe',
                          color:'#5b21b6'}}>
                          {s.brandChangeManual ? 'Manual' : 'Auto'}
                        </span>
                      </td>
                      <td style={{padding:'8px 12px'}}>
                        {s.brandChangeManual ? (
                          <button onClick={()=>handleUnbrandChange(s)} disabled={pending===s.id}
                            style={{fontSize:10,padding:'3px 10px',borderRadius:5,cursor:'pointer',
                              border:'1px solid #16a34a',background:'#f0fdf4',color:'#166534',
                              opacity:pending===s.id?0.5:1}}>↩ Reintegrar</button>
                        ) : (
                          <span style={{fontSize:10,color:'#c4b5fd'}}>Detectada por grupo</span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}

      {/* ── Gráficos de tendencia (diario + mensual) ── */}
      <TrendCharts />

      {/* ── Tabla dinámica consolidada ── */}
      <div style={{padding:'12px 20px 24px'}}>
        <Card
          title={`Inventario consolidado · ${filtered.length} pantallas`}
          headerRight={
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <span className="me-card-stat me-card-stat-ok"><span className="me-state-dot"/> {online} online</span>
              <span className="me-card-stat me-card-stat-crit"><span className="me-state-dot"/> {offline} offline</span>
              <button onClick={() => exportScreensPDF(filtered, chartsRef)}
                style={{padding:'4px 10px',fontSize:11,fontWeight:600,borderRadius:5,
                  border:'1.5px solid #dc2626',background:'#fef2f2',color:'#dc2626',cursor:'pointer'}}>
                ↓ PDF
              </button>
            </div>
          }
        >
          {/* Filtros */}
          <div style={{display:'flex',gap:10,padding:'10px 14px',borderBottom:'1px solid #f1f5f9',flexWrap:'wrap',alignItems:'center'}}>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <span style={{fontSize:11,color:'#9ca3af',marginRight:2}}>Estado:</span>

// ──────────────────────────────────────────────────────────────
// Excel export — snapshot histórico de una fecha
// ──────────────────────────────────────────────────────────────
function exportSnapshotExcel(snapshot) {
  if (!window.XLSX) { alert('Librería Excel no disponible'); return; }
  const XLSX = window.XLSX;
  const tipoLabel = t => ({ propia: 'Adm. Propia', franquicia: 'Franquicia', sin_clasificar: 'Sin clasificar' }[t] || 'Sin clasificar');
  const srvLabel  = s => s === 'bosque' ? 'Bosque' : 'Callecalle';
  const codigo    = n => { const m = (n || '').match(/^(\d+)/); return m ? m[1] : '—'; };

  // Hoja 1: Inventario de la fecha
  const h1cols = ['Código Tienda','Tipo','Nombre','Grupo completo','Servidor','Estado','IP','MAC','Modelo','Exclusión'];
  const h1rows = snapshot.devices.map(d => ({
    'Código Tienda': codigo(d.n),
    'Tipo':          tipoLabel(getTipoTienda(d.n)),
    'Nombre':        d.n,
    'Grupo completo':d.g,
    'Servidor':      srvLabel(d.s),
    'Estado':        d.on ? 'Online' : 'Offline',
    'IP':            d.ip,
    'MAC':           d.mac,
    'Modelo':        d.mo,
    'Exclusión':     d.ex ? 'Excluida' : 'Activa',
  }));
  const ws1 = XLSX.utils.json_to_sheet(h1rows, { header: h1cols });
  ws1['!cols'] = [8,16,32,40,12,10,16,20,14,12].map(w => ({ wch: w }));

  // Hoja 2: Resumen por Servidor de la fecha
  function st(devs) {
    const total = devs.length;
    const online = devs.filter(d => d.on).length;
    const offline = total - online;
    const pct = total > 0 ? (online / total * 100).toFixed(1) + '%' : '—';
    const propia = devs.filter(d => getTipoTienda(d.n) === 'propia').length;
    const franq  = devs.filter(d => getTipoTienda(d.n) === 'franquicia').length;
    const excl   = devs.filter(d => d.ex).length;
    return { total, online, offline, pct, propia, franq, excl };
  }
  const bDevs = snapshot.devices.filter(d => d.s === 'bosque');
  const cDevs = snapshot.devices.filter(d => d.s === 'callecalle');
  const mk = (label, x) => ({ 'Servidor':label, 'Total pantallas':x.total, 'Online':x.online, 'Offline':x.offline,
    '% Disponibilidad':x.pct, 'Adm. Propia':x.propia, 'Franquicia':x.franq, 'Excluidas':x.excl });
  const ws2 = XLSX.utils.json_to_sheet([
    mk('Bosque', st(bDevs)), mk('Callecalle', st(cDevs)), mk('Total', st(snapshot.devices)),
  ], { header: ['Servidor','Total pantallas','Online','Offline','% Disponibilidad','Adm. Propia','Franquicia','Excluidas'] });
  ws2['!cols'] = [14,16,10,10,18,14,12,12].map(w => ({ wch: w }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws1, 'Inventario');
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen por Servidor');
  XLSX.writeFile(wb, `netwatch_inventario_${snapshot.date}.xlsx`);
}

// ──────────────────────────────────────────────────────────────
// Histórico por fecha — selector + resumen + descarga Excel
// ──────────────────────────────────────────────────────────────
function HistoricoCard() {
  const [dates,    setDates]    = useState([]);
  const [selDate,  setSelDate]  = useState('');
  const [snapshot, setSnapshot] = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState('');

  useEffect(() => {
    fetch('/api/snapshots')
      .then(r => r.json())
      .then(d => {
        if (d.ok && d.dates.length > 0) {
          setDates(d.dates);
          setSelDate(d.dates[d.dates.length - 1]); // más reciente
        }
      })
      .catch(() => {});
  }, []);

  useEffect(() => {
    if (!selDate) return;
    setLoading(true); setError(''); setSnapshot(null);
    fetch(`/api/snapshots/${selDate}`)
      .then(r => r.json())
      .then(d => {
        if (d.ok) setSnapshot(d.snapshot);
        else setError(d.error || 'Error al cargar');
      })
      .catch(() => setError('Error de conexión'))
      .finally(() => setLoading(false));
  }, [selDate]);

  const fmtFecha = iso => {
    const [y,m,dd] = iso.split('-');
    return `${dd}-${m}-${y}`;
  };

  let resumen = null;
  if (snapshot) {
    const devs = snapshot.devices;
    const online = devs.filter(d => d.on).length;
    resumen = {
      total: devs.length, online, offline: devs.length - online,
      pct: devs.length > 0 ? (online / devs.length * 100).toFixed(1) : '—',
      hora: new Date(snapshot.ts).toLocaleTimeString('es-CL', { timeZone:'America/Santiago', hour:'2-digit', minute:'2-digit' }),
    };
  }

  return (
    <Card title="Histórico por fecha"
      headerRight={<span style={{fontSize:11,color:'#9ca3af'}}>{dates.length} día{dates.length!==1?'s':''} con datos</span>}>
      <div className="me-card-pad" style={{display:'flex',flexDirection:'column',gap:14}}>
        {dates.length === 0 ? (
          <div style={{color:'#9ca3af',fontSize:12,padding:'12px 0'}}>
            Aún no hay snapshots guardados. El historial comienza a acumularse desde hoy —
            cada día queda registrado el último estado de todas las pantallas.
          </div>
        ) : (
          <>
            <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <label style={{fontSize:12,color:'#6b7280',fontWeight:600}}>Fecha:</label>
              <select value={selDate} onChange={e => setSelDate(e.target.value)}
                style={{padding:'5px 10px',fontSize:12,border:'1px solid #d1d5db',borderRadius:6,
                  background:'#fff',color:'#2d3540',cursor:'pointer'}}>
                {[...dates].reverse().map(d => (
                  <option key={d} value={d}>{fmtFecha(d)}</option>
                ))}
              </select>
              <button onClick={() => snapshot && exportSnapshotExcel(snapshot)}
                disabled={!snapshot || loading}
                style={{padding:'5px 14px',fontSize:12,fontWeight:600,borderRadius:6,cursor:'pointer',
                  border:'1.5px solid #16a34a',background:'#f0fdf4',color:'#16a34a',
                  opacity: (!snapshot || loading) ? 0.5 : 1}}>
                ↓ Excel
              </button>
            </div>
            {loading && <div style={{fontSize:12,color:'#9ca3af'}}>Cargando…</div>}
            {error   && <div style={{fontSize:12,color:'#dc4f4f'}}>{error}</div>}
            {resumen && (
              <div style={{display:'flex',gap:24,flexWrap:'wrap',fontSize:12,color:'#6b7280',
                borderTop:'1px solid #eef1f5',paddingTop:12}}>
                <span><b style={{color:'#2563eb'}}>{resumen.total.toLocaleString('es-CL')}</b> pantallas</span>
                <span><b style={{color:'#16a34a'}}>{resumen.online.toLocaleString('es-CL')}</b> online</span>
                <span><b style={{color:'#dc4f4f'}}>{resumen.offline.toLocaleString('es-CL')}</b> offline</span>
                <span><b>{resumen.pct}%</b> disponibilidad</span>
                <span style={{color:'#9ca3af'}}>último registro: {resumen.hora} hrs</span>
              </div>
            )}
          </>
        )}
      </div>
    </Card>
  );
}

  return (
    <div className="me-view me-view-reports" style={{overflowY:'auto'}}>
      <div className="me-reports-stats">
        <div className="me-stat-block">
          <div className="me-stat-label">Availability (now)</div>
          <div className="me-stat-value me-stat-ok">{availability}%</div>
          <div className="me-stat-hint">{online} of {total} screens responding</div>
        </div>
        <div className="me-stat-block">
          <div className="me-stat-label">Disconnects (24h)</div>
          <div className="me-stat-value me-stat-crit">{disconnects24h}</div>
          <div className="me-stat-hint">across all locations</div>
        </div>
        <div className="me-stat-block">
          <div className="me-stat-label">Reconnects (24h)</div>
          <div className="me-stat-value me-stat-ok">{reconnects24h}</div>
          <div className="me-stat-hint">automatic recoveries</div>
        </div>
        <div className="me-stat-block">
          <div className="me-stat-label">Total fleet</div>
          <div className="me-stat-value">{total}</div>
          <div className="me-stat-hint">monitored displays</div>
        </div>
      </div>

      {/* ── Consolidado total de pantallas ── */}
      <div style={{padding:'16px 20px 0'}}>
        <ResumenServidorTable
          bosqueAll={allScreensData?.bosque || []}
          callecalleAll={allScreensData?.callecalle || []} />

      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// Event log — terminal-style stream of connection events
// ──────────────────────────────────────────────────────────────
function EventLog({ feed, screens }) {
  return (
    <div className="me-eventlog">
      <div className="me-eventlog-body">
        {feed.length === 0 && (
          <div className="me-eventlog-empty">— no events —</div>
        )}
        {feed.map(f => {
          const dev = f.screenId ? screens.find(s => s.id === f.screenId) : null;
          const isDown = f.kind === 'offline';
          return (
            <div key={f.id} className={`me-eventlog-row me-eventlog-${f.kind} ${f.isNew ? 'is-new' : ''}`}>
              <span className="me-evl-time">{fmtAge(f.tMin)}</span>
              <span className={`me-evl-tag me-evl-tag-${isDown ? 'crit' : 'ok'}`}>
                {isDown ? '↓ DOWN' : '↑ UP'}
              </span>
              <span className="me-evl-host">{dev ? dev.name : (f.deviceName || f.group || '—')}</span>
              <span className="me-evl-meta">
                {dev && <span className="me-evl-ip">{dev.ip}</span>}
                {dev && <span className="me-evl-sep">·</span>}
                {dev ? <span className="me-evl-loc">{shortLoc(dev.loc)}</span> : f.group && <span className="me-evl-loc">{shortLoc(f.group)}</span>}
              </span>
              <span className="me-evl-msg">{f.msg}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}
