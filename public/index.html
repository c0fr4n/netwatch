<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NetWatch — MagicInfo Display Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NetWatch · MagicInfo Display Monitor
   Hybrid: business-dashboard chrome (light) over NOC content
   ============================================================ */

:root {
  --me-bg:           #f4f6f9;
  --me-card:         #ffffff;
  --me-card-head:    #f8f9fb;
  --me-brandbar:     #ffffff;
  --me-nav:          #2d3540;
  --me-nav-active:   #1f262f;
  --me-border:       #e4e7ec;
  --me-border-soft:  #eef1f5;
  --me-fg:           #2d3540;
  --me-fg-muted:     #6b7683;
  --me-fg-subtle:    #94a3b8;
  --me-fg-dim:       #c2c9d3;

  --me-blue:    #3b9bf2;
  --me-blue-d:  #1e7fd6;
  --me-orange:  #f5a623;
  --me-green:   #4ade80;
  --me-green-d: #16a34a;
  --me-red:     #f87171;
  --me-red-d:   #dc4f4f;
  --me-purple:  #9b6dff;
  --me-teal:    #26c6c4;
  --me-cta:     #16a34a;
  --me-cta-h:   #128838;

  --me-mono: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --me-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body, #root {
  background: var(--me-bg);
  color: var(--me-fg);
  font-family: var(--me-sans);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden;
}

button { font-family: inherit; cursor: pointer; }
input  { font-family: inherit; }

.me-root {
  height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: hidden;
}

/* ============================================================
   Brand bar (white) — 3 columns: brand | counters | clock+user
   ============================================================ */
.me-brandbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 10px 28px;
  background: var(--me-brandbar);
  border-bottom: 1px solid var(--me-border);
  min-height: 60px;
}
.me-brand { display: flex; align-items: center; gap: 14px; justify-self: start; }
.me-brand-mark { display: flex; }
.me-brand-text { display: flex; flex-direction: column; line-height: 1.15; }
.me-brand-co {
  font-size: 13px; color: var(--me-fg-muted);
  letter-spacing: 0.02em; font-weight: 500;
}
.me-brand-product {
  font-size: 18px; font-weight: 700;
  color: var(--me-fg); letter-spacing: -0.01em;
}

.me-brandbar-center {
  display: flex; gap: 28px; align-items: center;
  justify-self: center;
}
.me-bb-stat {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--me-fg-muted);
  letter-spacing: 0.04em;
}
.me-bb-stat-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--me-fg-subtle); }
.me-bb-stat-ok .me-bb-stat-dot   { background: var(--me-green); box-shadow: 0 0 6px var(--me-green); animation: me-pulse-ok 2.4s ease-in-out infinite; }
.me-bb-stat-crit .me-bb-stat-dot { background: var(--me-red);   box-shadow: 0 0 6px var(--me-red);   animation: me-blink 1.4s ease-in-out infinite; }
@keyframes me-pulse-ok {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.5; }
}
.me-bb-stat-label { font-weight: 500; }
.me-bb-stat-val {
  font-family: var(--me-mono);
  font-weight: 700;
  font-size: 16px;
  color: var(--me-fg);
}
.me-bb-stat-ok .me-bb-stat-val   { color: var(--me-green-d); }
.me-bb-stat-crit .me-bb-stat-val { color: var(--me-red-d); }

.me-brandbar-right {
  display: flex; align-items: center; gap: 18px;
  justify-self: end;
}
.me-clock {
  display: flex; flex-direction: column;
  align-items: flex-end;
  line-height: 1.15;
  font-family: var(--me-mono);
}
.me-clock-date { font-size: 11px; color: var(--me-fg-muted); letter-spacing: 0.04em; }
.me-clock-time { font-size: 15px; color: var(--me-fg); font-weight: 700; letter-spacing: 0.04em; }
.me-iconbtn {
  width: 30px; height: 30px;
  border: 1px solid var(--me-border);
  background: var(--me-card);
  border-radius: 999px;
  color: var(--me-fg-muted);
  font-size: 14px; font-weight: 500;
  display: inline-flex; align-items: center; justify-content: center;
}
.me-iconbtn:hover { color: var(--me-blue); border-color: var(--me-blue); }

.me-profile { display: flex; align-items: center; gap: 10px; padding: 4px 10px 4px 4px; border-radius: 6px; }
.me-profile:hover { background: var(--me-bg); }
.me-avatar {
  width: 30px; height: 30px; border-radius: 999px;
  background: linear-gradient(135deg, var(--me-blue), var(--me-purple));
  color: white; font-weight: 700; font-size: 13px;
  display: inline-flex; align-items: center; justify-content: center;
}
.me-profile-name { font-size: 13px; color: var(--me-fg); }
.me-profile-caret { color: var(--me-fg-muted); font-size: 10px; }

/* ============================================================
   Nav bar (dark slate)
   ============================================================ */
.me-nav {
  display: flex; align-items: stretch; justify-content: space-between;
  background: var(--me-nav);
  color: #d6dde4;
  padding: 0 16px 0 0;
}
.me-nav-tabs { list-style: none; display: flex; }
.me-tab {
  padding: 0 18px;
  height: 44px;
  background: transparent;
  border: 0;
  color: #c2c9d3;
  font-size: 13px;
  letter-spacing: 0.01em;
  border-bottom: 2px solid transparent;
  display: inline-flex; align-items: center;
}
.me-tab:hover { color: white; background: rgba(255,255,255,0.04); }
.me-tab.active {
  color: white;
  background: var(--me-nav-active);
  border-bottom-color: var(--me-green);
  font-weight: 500;
}

.me-nav-right { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.me-cta {
  background: var(--me-cta);
  color: white;
  border: 0;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 3px;
}
.me-cta:hover { background: var(--me-cta-h); }
.me-iconbtn-dark {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.06);
  border: 0;
  color: white;
  border-radius: 3px;
  display: inline-flex; align-items: center; justify-content: center;
}
.me-iconbtn-dark:hover { background: rgba(255,255,255,0.12); }

.me-search {
  display: inline-flex; align-items: center; gap: 8px;
  background: white;
  color: var(--me-fg-muted);
  padding: 7px 12px;
  border-radius: 999px;
  width: 240px;
}
.me-search input {
  border: 0; outline: 0; background: transparent;
  font-size: 12px;
  flex: 1; min-width: 0;
  color: var(--me-fg);
}
.me-search input::placeholder { color: var(--me-fg-muted); }

/* ============================================================
   KPI strip
   ============================================================ */
.me-kpi-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--me-card);
  border-bottom: 1px solid var(--me-border);
  margin: 0;
}
.me-kpi {
  padding: 22px 28px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-right: 1px solid var(--me-border);
  text-align: center;
}
.me-kpi:last-child { border-right: 0; }
.me-kpi-value {
  font-size: 36px;
  font-weight: 400;
  color: var(--me-blue);
  line-height: 1;
  letter-spacing: -0.01em;
  font-family: var(--me-mono);
}
.me-kpi-label {
  font-size: 12px;
  color: var(--me-fg-muted);
  margin-top: 8px;
  letter-spacing: 0.02em;
}

/* ============================================================
   Layout — cards + right sidebar
   ============================================================ */
.me-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
  gap: 18px;
  padding: 18px 22px;
  max-width: 1700px;
  margin: 0 auto;
  width: 100%;
  min-height: 0;
  overflow: hidden;
}
.me-layout-nosidebar {
  grid-template-columns: 1fr;
}
.me-main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  align-content: start;
  min-height: 0;
}
.me-main-fullwidth {
  grid-template-columns: 1fr;
  min-height: 0;
}
.me-main-fullwidth > .me-card {
  min-height: 0;
  height: 100%;
}

/* ============================================================
   Card chrome (matches MDM Plus)
   ============================================================ */
.me-card {
  background: var(--me-card);
  border: 1px solid var(--me-border);
  border-radius: 4px;
  display: flex; flex-direction: column;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}
.me-card-body {
  padding: 0;
  min-height: 0;
  flex: 1;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.me-card-stats {
  display: flex; gap: 14px;
  margin-right: 8px;
}
.me-card-stat {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--me-mono);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 2px;
}
.me-card-stat-ok   { color: var(--me-green-d); background: rgba(74, 222, 128, 0.14); }
.me-card-stat-crit { color: var(--me-red-d);   background: rgba(248, 113, 113, 0.14); }
.me-card-stat .me-state-dot { width: 6px; height: 6px; border-radius: 999px; }
.me-card-stat-ok .me-state-dot   { background: var(--me-green); }
.me-card-stat-crit .me-state-dot { background: var(--me-red); animation: me-blink 1.4s ease-in-out infinite; }

/* ============================================================
   View containers — fill remaining viewport, no scroll
   ============================================================ */
.me-view {
  min-height: 0;
  overflow: hidden;
  padding: 16px 22px;
  max-width: 1700px;
  margin: 0 auto;
  width: 100%;
  display: flex; flex-direction: column;
}

/* Card body — let each view's children manage their own padding */
.me-card-pad { padding: 18px 20px; }

/* ─── HOME ─── two columns: offline + event log ─── */
.me-home-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
  gap: 16px;
  flex: 1;
  min-height: 0;
}
.me-home-grid > .me-card { min-height: 0; }

.me-home-allclear {
  display: flex; align-items: center; gap: 14px;
  padding: 24px 22px;
}
.me-home-allclear-dot {
  width: 36px; height: 36px;
  border-radius: 999px;
  background: rgba(74, 222, 128, 0.15);
  border: 1.5px solid var(--me-green);
  position: relative;
  flex-shrink: 0;
}
.me-home-allclear-dot::after {
  content: '';
  position: absolute; inset: 8px;
  border-radius: 999px;
  background: var(--me-green);
  box-shadow: 0 0 12px var(--me-green);
  animation: me-pulse-ok 2.4s ease-in-out infinite;
}
.me-home-allclear-title {
  font-size: 14px; font-weight: 700; color: var(--me-fg);
}
.me-home-allclear-sub {
  font-size: 12px; color: var(--me-fg-muted);
}

/* ─── SCREENS ─── 2 donuts on top + inventory below ─── */
.me-screens-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  gap: 14px;
  flex: 1;
  min-height: 0;
}
.me-screens-grid > .me-card:nth-child(3) {
  grid-column: 1 / -1;
  min-height: 0;
}

/* ─── REPORTS ─── stats strip + two tables ─── */
.me-reports-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--me-border);
  border: 1px solid var(--me-border);
  border-radius: 4px;
  margin-bottom: 14px;
  overflow: hidden;
}
.me-stat-block {
  background: var(--me-card);
  padding: 18px 22px;
  display: flex; flex-direction: column; gap: 6px;
}
.me-stat-label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--me-fg-muted);
  font-weight: 500;
}
.me-stat-value {
  font-family: var(--me-mono);
  font-size: 32px;
  font-weight: 400;
  color: var(--me-fg);
  line-height: 1;
}
.me-stat-ok   { color: var(--me-green-d); }
.me-stat-crit { color: var(--me-red-d); }
.me-stat-hint { font-size: 11px; color: var(--me-fg-subtle); }

.me-reports-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  flex: 1; min-height: 0;
}
.me-reports-grid > .me-card { min-height: 0; }
.me-rt-table {
  display: flex; flex-direction: column;
  flex: 1; overflow-y: auto;
}
.me-rt-head, .me-rt-row {
  display: grid;
  grid-template-columns: 1.6fr 1fr 1fr 1fr;
  gap: 10px;
  padding: 9px 20px;
  align-items: center;
}
.me-rt-head {
  background: var(--me-card-head);
  border-bottom: 1px solid var(--me-border);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--me-fg-muted);
  font-weight: 600;
}
.me-rt-row {
  border-bottom: 1px solid var(--me-border-soft);
  font-size: 12px;
}
.me-rt-row:last-child { border-bottom: 0; }
.me-rt-label { color: var(--me-fg); }
.me-rt-num {
  font-family: var(--me-mono);
  font-weight: 700;
  text-align: right;
}

/* ─── Event log — terminal stream ─── */
.me-log-pulse {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--me-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--me-fg-muted);
  padding: 3px 9px;
  border-radius: 2px;
  background: var(--me-card-head);
  border: 1px solid var(--me-border);
}
.me-log-pulse-dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--me-green);
  box-shadow: 0 0 6px var(--me-green);
  animation: me-pulse-ok 1.6s ease-in-out infinite;
}

.me-eventlog {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
}
.me-eventlog-body {
  flex: 1; min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--me-border) transparent;
}
.me-eventlog-body::-webkit-scrollbar { width: 6px; }
.me-eventlog-body::-webkit-scrollbar-thumb { background: var(--me-border); border-radius: 3px; }
.me-eventlog-empty {
  padding: 30px 20px;
  text-align: center;
  color: var(--me-fg-subtle);
  font-family: var(--me-mono);
  font-size: 13px;
}

.me-eventlog-row {
  display: grid;
  grid-template-columns: 78px 78px 1.4fr 1.6fr 2fr;
  gap: 14px;
  padding: 9px 18px;
  align-items: baseline;
  border-bottom: 1px solid var(--me-border-soft);
  font-family: var(--me-mono);
  font-size: 12px;
  transition: background 0.2s;
}
.me-eventlog-row:last-child { border-bottom: 0; }
.me-eventlog-row.is-new {
  animation: me-evl-flash 2s ease-out;
}
@keyframes me-evl-flash {
  0%   { background: rgba(248, 113, 113, 0.18); }
  20%  { background: rgba(248, 113, 113, 0.18); }
  100% { background: transparent; }
}
.me-eventlog-online.is-new { animation-name: me-evl-flash-ok; }
@keyframes me-evl-flash-ok {
  0%   { background: rgba(74, 222, 128, 0.18); }
  20%  { background: rgba(74, 222, 128, 0.18); }
  100% { background: transparent; }
}
.me-eventlog-offline { background: rgba(248, 113, 113, 0.03); }

.me-evl-time {
  color: var(--me-fg-subtle);
  font-size: 11px;
  letter-spacing: 0.02em;
}
.me-evl-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 7px;
  border-radius: 2px;
  text-align: center;
  width: fit-content;
}
.me-evl-tag-ok   { color: var(--me-green-d); background: rgba(74, 222, 128, 0.16); border: 1px solid rgba(74, 222, 128, 0.3); }
.me-evl-tag-crit { color: var(--me-red-d);   background: rgba(248, 113, 113, 0.16); border: 1px solid rgba(248, 113, 113, 0.4); }
.me-evl-host {
  color: var(--me-fg);
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.me-evl-meta {
  font-size: 11px;
  color: var(--me-fg-muted);
  display: flex; gap: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.me-evl-ip { color: var(--me-fg-muted); }
.me-evl-loc { color: var(--me-fg-subtle); }
.me-evl-sep { color: var(--me-fg-dim); }
.me-evl-msg {
  color: var(--me-fg-muted);
  font-size: 11.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

@media (max-width: 1100px) {
  .me-home-grid { grid-template-columns: 1fr; }
  .me-screens-grid { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
  .me-reports-grid { grid-template-columns: 1fr; }
  .me-reports-stats { grid-template-columns: repeat(2, 1fr); }
}
.me-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--me-card-head);
  border-bottom: 1px solid var(--me-border);
  border-radius: 4px 4px 0 0;
}
.me-card-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--me-fg);
}
.me-drag-handle {
  display: inline-grid;
  grid-template-columns: 2px 2px;
  grid-template-rows: 2px 2px 2px;
  gap: 2px;
  cursor: grab;
  opacity: 0.5;
}
.me-drag-handle > span {
  background: var(--me-fg-subtle);
  width: 2px; height: 2px;
  border-radius: 999px;
}
.me-card-actions { display: flex; align-items: center; gap: 6px; }
.me-card-iconbtn {
  width: 24px; height: 24px;
  background: transparent;
  border: 0;
  border-radius: 3px;
  color: var(--me-fg-subtle);
  display: inline-flex; align-items: center; justify-content: center;
}
.me-card-iconbtn:hover { background: var(--me-bg); color: var(--me-fg-muted); }

/* ============================================================
   Donut
   ============================================================ */
.me-donut-wrap {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  align-items: center;
}
.me-donut {
  width: 200px; height: 200px;
}
.me-donut-center {
  font-family: var(--me-mono);
  font-size: 28px;
  font-weight: 400;
  fill: var(--me-fg);
}
.me-donut-center-sub {
  font-size: 11px;
  letter-spacing: 0.1em;
  fill: var(--me-fg-muted);
  text-transform: uppercase;
}
.me-donut-legend {
  list-style: none;
  display: flex; flex-direction: column;
  gap: 8px;
  min-width: 0;
}
.me-donut-legend li {
  display: grid;
  grid-template-columns: 12px 1fr auto;
  gap: 10px;
  align-items: center;
  font-size: 12px;
}
.me-legend-swatch {
  width: 12px; height: 12px;
  border-radius: 2px;
}
.me-legend-label {
  color: var(--me-fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.me-legend-value {
  font-family: var(--me-mono);
  color: var(--me-fg-muted);
  font-size: 12px;
}

/* ============================================================
   Activity feed (right column)
   ============================================================ */
.me-side {
  display: flex; flex-direction: column;
}
.me-activity {
  background: var(--me-card);
  border: 1px solid var(--me-border);
  border-radius: 4px;
  display: flex; flex-direction: column;
  position: sticky; top: 18px;
  max-height: calc(100vh - 36px);
}
.me-activity-list {
  list-style: none;
  flex: 1; overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--me-border) transparent;
}
.me-activity-list::-webkit-scrollbar { width: 6px; }
.me-activity-list::-webkit-scrollbar-thumb { background: var(--me-border); border-radius: 3px; }

.me-activity-item {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--me-border-soft);
  align-items: flex-start;
}
.me-activity-item:last-child { border-bottom: 0; }
.me-activity-item.is-new { animation: me-flash 1.4s ease-out; }
@keyframes me-flash {
  0%   { background: rgba(59, 155, 242, 0.10); }
  100% { background: transparent; }
}
.me-activity-icon {
  width: 30px; height: 30px;
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 14px;
  line-height: 1;
  margin-top: 2px;
}
.me-aic-ok   { background: var(--me-green); }
.me-aic-crit { background: var(--me-red); }
.me-aic-warn { background: var(--me-orange); }
.me-aic-info { background: var(--me-blue); }
.me-aic-mute { background: var(--me-fg-subtle); }

.me-activity-body { min-width: 0; }
.me-activity-msg {
  font-size: 13px;
  color: var(--me-fg);
  line-height: 1.45;
  word-wrap: break-word;
}
.me-activity-screen {
  font-family: var(--me-mono);
  font-weight: 700;
  color: var(--me-fg);
}
.me-activity-text { color: var(--me-fg-muted); }
.me-activity-meta {
  display: flex; align-items: center; gap: 10px;
  margin-top: 6px;
  font-size: 11px;
}
.me-activity-tag {
  font-family: var(--me-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 1px 6px;
  border-radius: 2px;
}
.me-tag-ok   { color: var(--me-green-d); background: rgba(74, 222, 128, 0.14); }
.me-tag-crit { color: var(--me-red-d);   background: rgba(248, 113, 113, 0.14); }
.me-tag-warn { color: #b27007;           background: rgba(245, 166, 35, 0.14); }
.me-tag-info { color: var(--me-blue-d);  background: rgba(59, 155, 242, 0.14); }
.me-tag-mute { color: var(--me-fg-muted); background: var(--me-bg); }
.me-activity-time {
  color: var(--me-fg-subtle);
  font-size: 11px;
}

/* ============================================================
   Screen inventory table (inside last card, full width)
   ============================================================ */
.me-screens-table {
  display: flex; flex-direction: column;
  min-height: 0;
  flex: 1;
}
.me-screens-head, .me-screen-row {
  display: grid;
  grid-template-columns: 1.3fr 1.2fr 1fr 1fr 1.2fr 1.3fr auto;
  gap: 14px;
  padding: 10px 20px;
  font-size: 12px;
  align-items: center;
}
.me-screens-head {
  background: var(--me-card-head);
  color: var(--me-fg-muted);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-top: 1px solid var(--me-border);
  border-bottom: 1px solid var(--me-border);
}
.me-screens-body {
  flex: 1; min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--me-border) transparent;
}
.me-screens-body::-webkit-scrollbar { width: 6px; }
.me-screens-body::-webkit-scrollbar-thumb { background: var(--me-border); border-radius: 3px; }
.me-screen-row {
  border-bottom: 1px solid var(--me-border-soft);
}
.me-screen-row:last-child { border-bottom: 0; }
.me-screen-row:hover { background: var(--me-bg); }
.me-row-offline { background: rgba(248, 113, 113, 0.04); }
.me-row-warning { background: rgba(245, 166, 35, 0.04); }

.me-screen-name {
  font-family: var(--me-mono);
  font-weight: 700;
  font-size: 12px;
  color: var(--me-fg);
}
.me-screen-loc   { color: var(--me-fg-muted); }
.me-screen-model { color: var(--me-fg-muted); font-family: var(--me-mono); font-size: 11px; }
.me-screen-ip    { color: var(--me-fg-muted); font-family: var(--me-mono); font-size: 11px; }
.me-screen-mac   { color: var(--me-fg-muted); font-family: var(--me-mono); font-size: 11px; letter-spacing: 0; }
.me-screen-play  { color: var(--me-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.me-screen-state {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--me-mono);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 2px;
  white-space: nowrap;
}
.me-state-dot {
  width: 6px; height: 6px; border-radius: 999px;
}
.me-state-online   { color: var(--me-green-d); background: rgba(74, 222, 128, 0.14); }
.me-state-online .me-state-dot   { background: var(--me-green); }
.me-state-offline  { color: var(--me-red-d); background: rgba(248, 113, 113, 0.14); }
.me-state-offline .me-state-dot  { background: var(--me-red); animation: me-blink 1.4s ease-in-out infinite; }
.me-state-warning  { color: #b27007; background: rgba(245, 166, 35, 0.14); }
.me-state-warning .me-state-dot  { background: var(--me-orange); }
@keyframes me-blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

.me-screens-empty {
  padding: 30px 20px; text-align: center; color: var(--me-fg-muted); font-size: 13px;
}

/* ============================================================
   Tile / Roster scroll containers — fit inside card body
   ============================================================ */
.me-tiles-wrap, .me-roster {
  flex: 1; min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--me-border) transparent;
}
.me-tiles-wrap::-webkit-scrollbar, .me-roster::-webkit-scrollbar { width: 6px; }
.me-tiles-wrap::-webkit-scrollbar-thumb, .me-roster::-webkit-scrollbar-thumb { background: var(--me-border); border-radius: 3px; }

/* ============================================================
   Tile layout — flat card grid, no screen mock
   ============================================================ */
.me-tiles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  padding: 16px 20px 20px;
}
.me-tile {
  position: relative;
  background: var(--me-card);
  border: 1px solid var(--me-border);
  border-radius: 4px;
  padding: 12px 14px 11px;
  display: flex; flex-direction: column;
  gap: 5px;
  min-width: 0;
  transition: border-color 0.15s, background 0.15s;
}
.me-tile::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 4px 0 0 4px;
}
.me-tile-online::before  { background: var(--me-green); }
.me-tile-offline::before { background: var(--me-red); animation: me-bar-pulse 1.6s ease-in-out infinite; }
.me-tile-offline {
  background: rgba(248, 113, 113, 0.05);
  border-color: rgba(248, 113, 113, 0.35);
}
@keyframes me-bar-pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.45; }
}

.me-tile-row1 {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.me-tile-type {
  font-family: var(--me-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  font-weight: 700;
  color: var(--me-fg-subtle);
}
.me-tile-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--me-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 2px;
  white-space: nowrap;
}

.me-tile-name {
  font-family: var(--me-mono);
  font-size: 14px;
  font-weight: 700;
  color: var(--me-fg);
  letter-spacing: 0.005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.me-tile-offline .me-tile-name { color: var(--me-red-d); }

.me-tile-id {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--me-mono);
  font-size: 10px;
  color: var(--me-fg-muted);
  white-space: nowrap;
  overflow: hidden;
}
.me-tile-ip   { color: var(--me-fg-muted); }
.me-tile-mac  { color: var(--me-fg-subtle); }
.me-tile-sep  { color: var(--me-fg-dim); }

.me-tile-meta {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  font-size: 11px;
  color: var(--me-fg-muted);
  min-width: 0;
}
.me-tile-loc {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.me-tile-model {
  font-family: var(--me-mono);
  font-size: 10px;
  color: var(--me-fg-subtle);
  white-space: nowrap;
  flex-shrink: 0;
}

.me-tile-foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--me-border-soft);
  margin-top: 2px;
  min-width: 0;
}
.me-tile-play {
  font-size: 11px;
  color: var(--me-fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.me-tile-offline .me-tile-play { color: var(--me-fg-dim); }
.me-tile-since {
  font-family: var(--me-mono);
  font-size: 10px;
  color: var(--me-fg-subtle);
  flex-shrink: 0;
  letter-spacing: 0.04em;
}
.me-tile-offline .me-tile-since { color: var(--me-red-d); }

/* ============================================================
   Roster layout — iconic row per screen
   ============================================================ */
.me-roster { display: flex; flex-direction: column; }
.me-roster-row {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 14px;
  padding: 14px 20px;
  align-items: center;
  border-bottom: 1px solid var(--me-border-soft);
}
.me-roster-row:last-child { border-bottom: 0; }
.me-roster-row:hover { background: var(--me-bg); }
.me-roster-offline { background: rgba(248, 113, 113, 0.04); }
.me-roster-warning { background: rgba(245, 166, 35, 0.04); }

.me-roster-icon {
  position: relative;
  width: 40px; height: 40px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--me-card-head);
  border: 1px solid var(--me-border);
  border-radius: 4px;
  color: var(--me-fg-muted);
}
.me-roster-online .me-roster-icon { color: var(--me-green-d); border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.06); }
.me-roster-offline .me-roster-icon { color: var(--me-red-d); border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.06); }
.me-roster-warning .me-roster-icon { color: #b27007; border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.06); }
.me-roster-dot {
  position: absolute;
  right: -2px; bottom: -2px;
  width: 14px; height: 14px;
  background: var(--me-card);
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
}
.me-roster-dot .me-state-dot { width: 8px; height: 8px; }

.me-roster-name {
  font-family: var(--me-mono);
  font-weight: 700;
  font-size: 13px;
  color: var(--me-fg);
  margin-bottom: 2px;
}
.me-roster-sub {
  font-size: 11px;
  color: var(--me-fg-muted);
}
.me-roster-ip { font-family: var(--me-mono); }
.me-roster-sep { color: var(--me-fg-dim); margin: 0 4px; }
.me-roster-meta {
  text-align: right;
  display: flex; flex-direction: column; gap: 4px;
}
.me-roster-play {
  font-size: 12px;
  color: var(--me-fg);
}
.me-roster-status {
  font-family: var(--me-mono);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 2px;
  align-self: flex-end;
}

/* ============================================================
   THEME — Bunker (NOC dark, monochrome green accents)
   ============================================================ */
.me-theme-bunker {
  --me-bg:           #0a0e14;
  --me-card:         #0f151c;
  --me-card-head:    #131a23;
  --me-brandbar:     #0f151c;
  --me-nav:          #060a10;
  --me-nav-active:   #0f151c;
  --me-border:       #1e2d1e;
  --me-border-soft:  #15202a;
  --me-fg:           #d6dde4;
  --me-fg-muted:     #8a96a4;
  --me-fg-subtle:    #5d6776;
  --me-fg-dim:       #404954;
  --me-cta:          var(--me-green-d);
}
.me-theme-bunker .me-brand-co { color: var(--me-fg-muted); }
.me-theme-bunker .me-brand-product { color: var(--me-green); letter-spacing: 0.04em; }
.me-theme-bunker .me-iconbtn { background: var(--me-card); border-color: var(--me-border); color: var(--me-fg-muted); }
.me-theme-bunker .me-iconbtn:hover { color: var(--me-green); border-color: var(--me-green); }
.me-theme-bunker .me-search { background: var(--me-card); }
.me-theme-bunker .me-search input { color: var(--me-fg); }
.me-theme-bunker .me-search input::placeholder { color: var(--me-fg-subtle); }
.me-theme-bunker .me-tab { color: #8a96a4; }
.me-theme-bunker .me-tab.active { color: var(--me-green); border-bottom-color: var(--me-green); background: var(--me-nav-active); }
.me-theme-bunker .me-profile-name { color: var(--me-fg); }
.me-theme-bunker .me-screen-row:hover,
.me-theme-bunker .me-roster-row:hover { background: #131a23; }

/* ============================================================
   THEME — Print (high-contrast monochrome, hairlines)
   ============================================================ */
.me-theme-print {
  --me-bg:           #ffffff;
  --me-card:         #ffffff;
  --me-card-head:    #ffffff;
  --me-brandbar:     #ffffff;
  --me-nav:          #000000;
  --me-nav-active:   #000000;
  --me-border:       #000000;
  --me-border-soft:  #d4d4d4;
  --me-fg:           #000000;
  --me-fg-muted:     #555555;
  --me-fg-subtle:    #999999;
  --me-fg-dim:       #c2c2c2;
  --me-cta:          #000000;
  --me-cta-h:        #333333;
}
.me-theme-print { background: #ffffff; }
.me-theme-print .me-card,
.me-theme-print .me-activity {
  border-radius: 0;
  border-width: 1.5px;
}
.me-theme-print .me-card-head { border-bottom-width: 1.5px; background: #ffffff; }
.me-theme-print .me-screens-head { background: #ffffff; }
.me-theme-print .me-tile,
.me-theme-print .me-roster-icon { border-radius: 0; }
.me-theme-print .me-brand-mark svg circle { stroke: #000000 !important; }
.me-theme-print .me-avatar { background: #000000; }
.me-theme-print .me-state-online   { background: transparent; color: #000000; border: 1px solid #000000; }
.me-theme-print .me-state-online .me-state-dot { background: #000000; }
.me-theme-print .me-state-offline  { background: #000000; color: #ffffff; border: 1px solid #000000; }
.me-theme-print .me-state-offline .me-state-dot { background: #ffffff; }
.me-theme-print .me-state-warning  { background: transparent; color: #000000; border: 1px dashed #000000; }
.me-theme-print .me-state-warning .me-state-dot { background: #000000; }
.me-theme-print .me-tile-online   { border-left-color: #000000; }
.me-theme-print .me-tile-offline  { border-left-color: #000000; background: #f4f4f4; }
.me-theme-print .me-tile::before  { background: #000000 !important; }
.me-theme-print .me-roster-icon { background: #ffffff; border-color: #000000 !important; color: #000000 !important; }
.me-theme-print .me-cta { border: 1px solid #ffffff; }
.me-theme-print .me-search { border: 1.5px solid #ffffff; }

/* ============================================================
   DENSITY — Roomy (executive, lots of whitespace)
   ============================================================ */
.me-density-roomy .me-card-head      { padding: 16px 22px; }
.me-density-roomy .me-screens-head,
.me-density-roomy .me-screen-row     { padding: 16px 28px; }
.me-density-roomy .me-roster-row     { padding: 20px 28px; }
.me-density-roomy .me-tiles-grid {
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  padding: 22px 28px 28px;
}
.me-density-roomy .me-screen-name,
.me-density-roomy .me-tile-name,
.me-density-roomy .me-roster-name    { font-size: 15px; }
.me-density-roomy .me-card-title     { font-size: 14px; }

/* ============================================================
   DENSITY — Dense (operator, packed)
   ============================================================ */
.me-density-dense .me-card-head      { padding: 7px 12px; }
.me-density-dense .me-screens-head,
.me-density-dense .me-screen-row     { padding: 5px 14px; gap: 10px; font-size: 11px; }
.me-density-dense .me-screen-name    { font-size: 11px; }
.me-density-dense .me-screen-model,
.me-density-dense .me-screen-ip,
.me-density-dense .me-screen-mac     { font-size: 10px; }
.me-density-dense .me-screen-state   { padding: 1px 5px; font-size: 9px; gap: 4px; }
.me-density-dense .me-state-dot      { width: 5px; height: 5px; }
.me-density-dense .me-tiles-grid {
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 6px;
  padding: 10px 14px;
}
.me-density-dense .me-tile          { padding: 8px 10px 7px; gap: 3px; }
.me-density-dense .me-tile-name     { font-size: 12px; }
.me-density-dense .me-tile-foot     { padding-top: 4px; }
.me-density-dense .me-roster-row     { padding: 7px 14px; }
.me-density-dense .me-roster-icon    { width: 32px; height: 32px; }
.me-density-dense .me-roster-name    { font-size: 11.5px; }
.me-density-dense .me-roster-sub     { font-size: 10px; }

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 1240px) {
  .me-layout { grid-template-columns: 1fr; }
  .me-activity { position: static; max-height: none; }
}
@media (max-width: 820px) {
  .me-main { grid-template-columns: 1fr; }
  .me-kpi-strip { grid-template-columns: repeat(2, 1fr); }
  .me-kpi { border-bottom: 1px solid var(--me-border); }
  .me-donut-wrap { grid-template-columns: 1fr; }
  .me-donut { margin: 0 auto; }
}


.me-kpi-ok    .me-kpi-value { color: #16a34a; }
.me-kpi-crit  .me-kpi-value { color: #dc4f4f; }
.me-kpi-warn  .me-kpi-value { color: #d97706; }
.me-kpi-mute  .me-kpi-value { color: #7c3aed; }
.me-kpi-total .me-kpi-value { color: #2563eb; }
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.3/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="text/babel">

const { useState, useEffect, useMemo, useRef } = React;

const C = {
  online:  '#4ade80',
  offline: '#f87171',
  warn:    '#f5a623',
  blue:    '#3b9bf2',
  purple:  '#9b6dff',
  teal:    '#26c6c4',
  pink:    '#e879a5',
  slate:   '#94a3b8',
};

const KINDS = { indoor: 'Indoor', outdoor: 'Outdoor', videowall: 'Video Wall', kiosk: 'Kiosk' };

const fmtAge = (min) => {
  if (min < 1) return 'just now';
  if (min < 60) return `${Math.round(min)} min ago`;
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return m === 0 ? `${h} h ago` : `${h} h ${m} m ago`;
};


// ──────────────────────────────────────────────────────────────
// Donut chart
// ──────────────────────────────────────────────────────────────
function Donut({ data, total, centerLabel, centerSub }) {
  const size = 200, stroke = 26;
  const r = (size - stroke) / 2;
  const cx = size / 2, cy = size / 2;
  const circumference = 2 * Math.PI * r;

  let offset = 0;
  const segments = data.map((d, i) => {
    const dash = (d.value / total) * circumference;
    const seg = { ...d, dash, offset };
    offset += dash;
    return seg;
  });

  return (
    <div className="me-donut-wrap">
      <svg viewBox={`0 0 ${size} ${size}`} className="me-donut">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#eef1f5" strokeWidth={stroke} />
        {segments.map((s, i) => (
          <circle
            key={i}
            cx={cx} cy={cy} r={r}
            fill="none"
            stroke={s.color}
            strokeWidth={stroke}
            strokeDasharray={`${s.dash} ${circumference - s.dash}`}
            strokeDashoffset={-s.offset}
            transform={`rotate(-90 ${cx} ${cy})`}
            style={{ transition: 'stroke-dasharray 0.4s ease' }}
          />
        ))}
        <text x={cx} y={cy - 4} textAnchor="middle" className="me-donut-center">{centerLabel}</text>
        {centerSub && <text x={cx} y={cy + 18} textAnchor="middle" className="me-donut-center-sub">{centerSub}</text>}
      </svg>
      <ul className="me-donut-legend">
        {data.map((d, i) => (
          <li key={i}>
            <span className="me-legend-swatch" style={{ background: d.color }} />
            <span className="me-legend-label">{d.label}</span>
            <span className="me-legend-value">{d.value.toLocaleString()}</span>
          </li>
        ))}
      </ul>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────

  const cards = [

// Acorta rutas MagicINFO "arcoprime>RT>20128>20128_P3" → "20128"
function shortLoc(loc) {
  if (!loc) return '—';
  const parts = loc.split('>').filter(Boolean);
  if (parts.length <= 1) return loc.replace(/_/g, ' ');
  const last = parts[parts.length - 1];
  // Si el último segmento parece un nombre de panel (_P1, _P2…), usa el anterior
  if (/[_-]P\d+$/i.test(last) && parts.length > 1) {
    return parts[parts.length - 2].replace(/_/g, ' ');
  }
  return last.replace(/_/g, ' ');
}

// ──────────────────────────────────────────────────────────────
// Inventory — switches layout based on tweak
// ──────────────────────────────────────────────────────────────
function ScreenInventory({ screens, search, layout }) {
  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    let list = q
      ? screens.filter(s =>
          s.name.toLowerCase().includes(q) ||
          s.ip.includes(q) ||
          (s.mac && s.mac.toLowerCase().includes(q)) ||
          s.loc.toLowerCase().includes(q) ||
          s.model.toLowerCase().includes(q))
      : screens;
    return [...list].sort((a, b) => {
      const order = { offline: 0, online: 1 };
      if (order[a.state] !== order[b.state]) return order[a.state] - order[b.state];
      return a.name.localeCompare(b.name);
    });
  }, [screens, search]);

  const rowHeight = 41; // px per row
  const bodyMaxH = 12 * rowHeight;

  if (layout === 'tiles') {
    return (
      <div className="me-tiles-wrap">
        <div className="me-tiles-grid">
          {filtered.map(s => <ScreenTile key={s.id} screen={s} />)}
        </div>
        {filtered.length === 0 && <div className="me-screens-empty">No screens match "{search}"</div>}
      </div>
    );
  }

  if (layout === 'roster') {
    return (
      <div className="me-roster">
        {filtered.map(s => <ScreenRoster key={s.id} screen={s} />)}
        {filtered.length === 0 && <div className="me-screens-empty">No screens match "{search}"</div>}
      </div>
    );
  }

  return (
    <div className="me-screens-table">
      <div className="me-screens-head">
        <span>Screen</span>
        <span>Location</span>
        <span>Model</span>
        <span>IP</span>
        <span>MAC</span>
        <span>Playing</span>
        <span>Status</span>
      </div>
      <div className="me-screens-body" style={{ maxHeight: bodyMaxH }}>
        {filtered.map(s => (
          <div key={s.id} className={`me-screen-row me-row-${s.state}`}>
            <span className="me-screen-name">{s.name}</span>
            <span className="me-screen-loc">{s.loc}</span>
            <span className="me-screen-model">{s.model}</span>
            <span className="me-screen-ip">{s.ip}</span>
            <span className="me-screen-mac">{s.mac}</span>
            <span className="me-screen-play">{s.play}</span>
            <span className={`me-screen-state me-state-${s.state}`}>
              <span className="me-state-dot" />
              {s.state === 'online' ? 'Online' : `Offline ${Math.round(s.sinceMin)}m`}
            </span>
          </div>
        ))}
        {filtered.length === 0 && (
          <div className="me-screens-empty">No screens match "{search}"</div>
        )}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// Tweak defaults — expressive controls that reshape the feel
// ──────────────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────
// API helpers
// ──────────────────────────────────────────────────────────────
function isOnline(d) {
  return d.power === true || d.power === 'true' ||
         d.panelStatus === true || d.panelStatus === 'true';
}

// Clasifica tienda por dígitos iniciales del nombre de pantalla
function getTipoTienda(name) {
  const match = (name || '').match(/^(\d+)/);
  if (!match) return 'sin_clasificar';
  return match[1].length === 4 ? 'propia' : match[1].length === 5 ? 'franquicia' : 'sin_clasificar';
}

function deviceToScreen(d, serverKey) {
  return {
    id:       d.deviceId || d.macAddress || String(Math.random()),
    name:     d.deviceName || d.deviceId || '—',
    loc:      d.groupName  || 'Sin grupo',
    model:    d.deviceModelName || '—',
    kind:     'indoor',
    ip:       d.ipAddress || '—',
    mac:      d.macAddress || '—',
    res:      '—',
    state:         isOnline(d) ? 'online' : 'offline',
    groupExcluded:       d._groupExcluded       === true,
    manualExcluded:      d._manualExcluded      === true,
    brandChange:         d._brandChange         === true,
    brandChangeManual:   d._brandChangeManual   === true,
    tipoTienda:          getTipoTienda(d.deviceName),
    sinceMin: 0,
    play:     '—',
    server:   serverKey,
  };
}

function alertToFeed(a, idx) {
  return {
    id:         a.id || ('a' + idx),
    kind:       a.type === 'recovery' ? 'online' : 'offline',
    screenId:   null,
    deviceName: a.name,
    group:      a.group,
    msg:        a.msg,
    tMin:       a.ts ? Math.round((Date.now() - a.ts) / 60000) : 0,
    isNew:      false,
    server:     a.server,
  };
}

// ──────────────────────────────────────────────────────────────
// Root
// ──────────────────────────────────────────────────────────────
function App() {
  const [theme,   setTheme]   = useState('daylight');
  const [density, setDensity] = useState('standard');
  const [layout,  setLayout]  = useState('tiles');
  const t = { theme, density, layout };
  const setTweak = (k, v) => {
    if (k === 'theme')   setTheme(v);
    if (k === 'density') setDensity(v);
    if (k === 'layout')  setLayout(v);
  };

  const [serverKey, setServerKey] = useState('both');
  const [active,    setActive]    = useState('Home');
  const [search,    setSearch]    = useState('');
  const [loading,   setLoading]   = useState(true);

  // allScreens holds BOTH servers always; screens is filtered view
  const [allScreensData, setAllScreensData] = useState({ bosque: [], callecalle: [] });
  const [allAlertsData,  setAllAlertsData]  = useState([]);
  const [showExcluded,      setShowExcluded]      = useState(false);
  const [showNoConsiderar,  setShowNoConsiderar]  = useState(false);
  const [showBrandChange,   setShowBrandChange]   = useState(false);

  async function loadData() {
    setLoading(true);
    try {
      const [devRes, alertRes] = await Promise.all([
        fetch('/api/devices?server=both'),
        fetch('/api/alerts?server=both'),
      ]);
      const devData   = await devRes.json();
      const alertData = await alertRes.json();

      if (devData.ok && devData.servers) {
        const byServer = { bosque: [], callecalle: [] };
        Object.entries(devData.servers).forEach(([k, srv]) => {
          if (srv.ok && srv.devices) {
            byServer[k] = srv.devices.map(d => deviceToScreen(d, k));
          }
        });
        setAllScreensData(byServer);
      }
      if (alertData.ok && alertData.alerts) {
        setAllAlertsData(alertData.alerts.map((a, i) => alertToFeed(a, i)));
      }
    } catch(e) { console.error('API error:', e); }
    setLoading(false);
  }

  useEffect(() => {
    loadData();
    const iv = setInterval(loadData, 5 * 60 * 1000);
    return () => clearInterval(iv);
  }, []);

  // Filter instantly in browser — no extra API call
  const rawScreens = serverKey === 'both'
    ? [...(allScreensData.bosque || []), ...(allScreensData.callecalle || [])]
    : (allScreensData[serverKey] || []);

  // showExcluded:     muestra excluidas manuales en Screens
  // showNoConsiderar: suma "no considerar" a los contadores de Home
  // showBrandChange:  suma "cambio de marca" a los contadores de Home
  const screens = rawScreens.filter(s =>
    (showNoConsiderar || !s.groupExcluded)  &&
    (showExcluded     || !s.manualExcluded) &&
    (showBrandChange  || !s.brandChange)
  );

  const feed = serverKey === 'both'
    ? allAlertsData
    : allAlertsData.filter(a => !a.server || a.server === serverKey);

  const total   = screens.length;
  const online  = screens.filter(s => s.state === 'online').length;
  const offline = screens.filter(s => s.state === 'offline').length;
  // Currently Offline nunca muestra "no considerar" ni "cambio de marca" aunque los toggles estén ON
  const offlineScreens = screens.filter(s => s.state === 'offline' && !s.groupExcluded && !s.brandChange);

  const rootCls = `me-root me-theme-${t.theme} me-density-${t.density} me-layout-${t.layout}`;

  return (
    <div className={rootCls}>
      <BrandBar
        online={online} offline={offline} total={total}
        serverKey={serverKey} setServerKey={setServerKey}
        loading={loading} onRefresh={loadData}
      />
      <NavBar active={active} setActive={setActive} search={search} setSearch={setSearch} />

      {active === 'Home' && (
        <HomeView offlineScreens={offlineScreens} feed={feed} screens={screens}
          online={online} offline={offline} total={total}
          showNoConsiderar={showNoConsiderar} setShowNoConsiderar={setShowNoConsiderar}
          noConsiderarCount={rawScreens.filter(s => s.groupExcluded).length}
          showBrandChange={showBrandChange} setShowBrandChange={setShowBrandChange}
          brandChangeCount={rawScreens.filter(s => s.brandChange).length}
          search={search}
        />
      )}
      {active === 'Screens' && (
        <ScreensView screens={screens} allScreensData={allScreensData}
          showExcluded={showExcluded} setShowExcluded={setShowExcluded}
          showBrandChange={showBrandChange} setShowBrandChange={setShowBrandChange}
          search={search} layout={t.layout} online={online} offline={offline} total={total} />
      )}
      {active === 'Reports' && (
        <ReportsView screens={screens} feed={feed} online={online} offline={offline} total={total} allScreensData={allScreensData} />
      )}

      <TweaksPanelSimple theme={t.theme} density={t.density} layout={t.layout} setTweak={setTweak} />
    </div>
  );
}

function TweaksPanelSimple({ theme, density, layout, setTweak }) {
  const [open, setOpen] = useState(false);
  const btnStyle = {position:'fixed',bottom:16,right:16,zIndex:9999,background:'#2d3540',color:'#fff',border:'none',borderRadius:8,padding:'7px 13px',fontSize:12,cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,.3)'};
  if (!open) return <button onClick={() => setOpen(true)} style={btnStyle}>⚙ Apariencia</button>;
  return (
    <div style={{position:'fixed',bottom:16,right:16,zIndex:9999,background:'#fff',border:'1px solid #e4e7ec',borderRadius:12,padding:16,width:220,boxShadow:'0 4px 20px rgba(0,0,0,.15)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <strong style={{fontSize:12}}>Apariencia</strong>
        <button onClick={() => setOpen(false)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,lineHeight:1}}>×</button>
      </div>
      {[
        { label:'Tema',     key:'theme',   options:['daylight','bunker','print'],      val: theme   },
        { label:'Densidad', key:'density', options:['roomy','standard','dense'],       val: density },
        { label:'Layout',   key:'layout',  options:['table','tiles','roster'],         val: layout  },
      ].map(({label,key,options,val}) => (
        <div key={key} style={{marginBottom:10}}>
          <div style={{fontSize:11,color:'#666',marginBottom:4}}>{label}</div>
          <div style={{display:'flex',gap:4}}>
            {options.map(o => (
              <button key={o} onClick={() => setTweak(key,o)}
                style={{flex:1,padding:'4px 0',fontSize:10,border:'1px solid',borderRadius:5,cursor:'pointer',
                  background:val===o?'#2d3540':'#f8f9fb',
                  color:val===o?'#fff':'#444',
                  borderColor:val===o?'#2d3540':'#e4e7ec'}}
              >{o}</button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}


// ──────────────────────────────────────────────────────────────
// Home view — live operations: offline tiles + event log
// ──────────────────────────────────────────────────────────────
function HomeView({ offlineScreens, feed, screens, online=0, offline=0, total=0,
  showNoConsiderar=false, setShowNoConsiderar, noConsiderarCount=0,
  showBrandChange=false, setShowBrandChange, brandChangeCount=0,
  search='' }) {
  const q = search.trim().toLowerCase();

    if (!q) return offlineScreens;
    return offlineScreens.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.loc  || '').toLowerCase().includes(q) ||
      (s.ip   || '').includes(q) ||
      (s.mac  || '').toLowerCase().includes(q)
    );
  }, [offlineScreens, q]);

  const liveFeed = useMemo(() => {
    const base = feed.filter(f => f.kind === 'online' || f.kind === 'offline');
    if (!q) return base;
    return base.filter(f =>
      (f.deviceName || '').toLowerCase().includes(q) ||
      (f.group      || '').toLowerCase().includes(q) ||
      (f.msg        || '').toLowerCase().includes(q)
    );
  }, [feed, q]);

  return (
    <div className="me-view me-view-home">
      <KpiStrip screens={screens} online={online} offline={offline} total={total} />

      {/* Toggles de grupos excluidos */}
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'6px 22px',borderBottom:'1px solid var(--me-border)',background:'var(--me-card)',flexWrap:'wrap'}}>

          onClick={() => setShowNoConsiderar && setShowNoConsiderar(v => !v)}
          style={{display:'inline-flex',alignItems:'center',gap:7,padding:'4px 12px',fontSize:11,fontWeight:600,
            borderRadius:20,cursor:'pointer',border:'1.5px solid',transition:'all .15s',

          {showNoConsiderar ? 'Incluir "No Considerar"' : 'Excluir "No Considerar"'}

// Resumen por Servidor — tabla estilo Hoja 2 del Excel

function ResumenServidorTable({ bosqueAll, callecalleAll }) {
  function stats(screens) {
    const total   = screens.length;
    const online  = screens.filter(s => s.state === 'online').length;
    const offline = screens.filter(s => s.state === 'offline').length;
    const pct     = total > 0 ? (online / total * 100).toFixed(1) + '%' : '—';
    const propia  = screens.filter(s => s.tipoTienda === 'propia').length;
    const franq   = screens.filter(s => s.tipoTienda === 'franquicia').length;
    const excl    = screens.filter(s => s.groupExcluded || s.manualExcluded || s.brandChange).length;
    return { total, online, offline, pct, propia, franq, excl };
  }
  const rows = [
    { label: 'Bosque',     ...stats(bosqueAll) },
    { label: 'Callecalle', ...stats(callecalleAll) },
    { label: 'Total',      ...stats([...bosqueAll, ...callecalleAll]) },
  ];
  const headers = ['Servidor','Total','Online','Offline','% Disp.','Adm. Propia','Franquicia','Excluidas'];
  const num = { fontVariantNumeric:'tabular-nums', textAlign:'right' };
  return (
    <div style={{background:'#fff',border:'1px solid #e4e7ec',borderRadius:8,padding:'14px 18px',
      display:'flex',flexDirection:'column',justifyContent:'center',minWidth:0,overflowX:'auto'}}>
      <div style={{fontSize:12,fontWeight:700,color:'#2d3540',marginBottom:10}}>Resumen por Servidor</div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
        <thead>
          <tr style={{borderBottom:'2px solid #e5e7eb'}}>
            {headers.map((h,i)=>(
              <th key={h} style={{padding:'6px 10px',fontSize:11,fontWeight:600,color:'#6b7280',
                textAlign: i===0 ? 'left' : 'right', whiteSpace:'nowrap'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.label} style={{borderBottom:'1px solid #f3f4f6',
              fontWeight: r.label==='Total' ? 700 : 400,
              background:  r.label==='Total' ? '#f8f9fb' : 'transparent'}}>
              <td style={{padding:'7px 10px',whiteSpace:'nowrap'}}>{r.label}</td>
              <td style={{padding:'7px 10px',...num}}>{r.total.toLocaleString('es-CL')}</td>
              <td style={{padding:'7px 10px',...num,color:'#16a34a'}}>{r.online.toLocaleString('es-CL')}</td>
              <td style={{padding:'7px 10px',...num,color:'#dc4f4f'}}>{r.offline.toLocaleString('es-CL')}</td>
              <td style={{padding:'7px 10px',...num}}>{r.pct}</td>
              <td style={{padding:'7px 10px',...num,color:'#1e40af'}}>{r.propia.toLocaleString('es-CL')}</td>
              <td style={{padding:'7px 10px',...num,color:'#92400e'}}>{r.franq.toLocaleString('es-CL')}</td>
              <td style={{padding:'7px 10px',...num,color:'#9ca3af'}}>{r.excl.toLocaleString('es-CL')}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// CSV export helper
// ──────────────────────────────────────────────────────────────
function exportCSV(screens) {
  const headers = ['Servidor','Nombre','Grupo','Estado','IP','MAC','Modelo'];
  const rows = screens.map(s => [
    s.server === 'bosque' ? 'Bosque' : 'Callecalle',
    s.name, s.loc,
    s.state === 'online' ? 'Online' : 'Offline',
    s.ip, s.mac, s.model,
  ]);
  const csv = [headers, ...rows]
    .map(r => r.map(v => `"${String(v || '').replace(/"/g, '""')}"`).join(','))
    .join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `netwatch_reporte_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ──────────────────────────────────────────────────────────────
// Mini donut (SVG inline, sin dependencias)
// ──────────────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────
// LineChart — gráfico de línea SVG (sin dependencias)
// points: [{ x:'label', y:Number|null, sub:'tooltip' }]
//   y == null  → hueco (slot del eje sin datos aún)
//   hasData    → si todos los slots están vacíos, muestra placeholder
// ──────────────────────────────────────────────────────────────
function LineChart({ points, color = '#3b9bf2', unit = '%' }) {
  const W = 440, H = 190;
  const padL = 34, padR = 14, padT = 14, padB = 28;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const real = (points || []).filter(p => p.y != null);
  if (real.length === 0) {
    return (
      <div style={{height:H,display:'flex',alignItems:'center',justifyContent:'center',color:'#9ca3af',fontSize:12}}>
        Aún no hay datos suficientes
      </div>
    );
  }

  const ys = real.map(p => p.y);
  let yMin = Math.min(...ys), yMax = Math.max(...ys);
  if (yMin === yMax) { yMin = Math.max(0, yMin - 5); yMax = Math.min(100, yMax + 5); }
  else { const pad = (yMax - yMin) * 0.15; yMin = Math.max(0, yMin - pad); yMax = Math.min(100, yMax + pad); }
  if (yMin === yMax) { yMin = 0; yMax = 100; }

  const n = points.length;
  const xAt = i => padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
  const yAt = v => padT + plotH - ((v - yMin) / (yMax - yMin)) * plotH;

  // coords por slot; null donde no hay datos
  const coords = points.map((p, i) => p.y == null ? null : ({ ...p, i, cx: xAt(i), cy: yAt(p.y) }));

  // tramos contiguos de datos (la línea se corta en los huecos)
  const runs = [];
  let cur = [];
  coords.forEach(c => { if (c) cur.push(c); else { if (cur.length) runs.push(cur); cur = []; } });
  if (cur.length) runs.push(cur);

  const yTicks = [yMin, (yMin + yMax) / 2, yMax];
  // X labels: todos si hay ≤12 slots, si no ~7 repartidos
  const xStep = n <= 12 ? 1 : Math.ceil(n / 7);
  const gid = 'lg' + color.replace('#', '');

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stopColor={color} stopOpacity="0.22"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {yTicks.map((t, i) => (
        <g key={i}>
          <line x1={padL} y1={yAt(t)} x2={W-padR} y2={yAt(t)} stroke="#eef1f5" strokeWidth="1"/>
          <text x={padL-6} y={yAt(t)+3} textAnchor="end" style={{fontSize:9,fill:'#94a3b8'}}>
            {t.toFixed(0)}{unit}
          </text>
        </g>
      ))}
      {runs.map((run, ri) => {
        const line = run.map((c, i) => `${i === 0 ? 'M' : 'L'} ${c.cx.toFixed(1)} ${c.cy.toFixed(1)}`).join(' ');
        const area = `${line} L ${run[run.length-1].cx.toFixed(1)} ${padT+plotH} L ${run[0].cx.toFixed(1)} ${padT+plotH} Z`;
        return (
          <g key={ri}>
            <path d={area} fill={`url(#${gid})`} />
            <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
          </g>
        );
      })}
      {coords.map((c, i) => c && (
        <circle key={i} cx={c.cx} cy={c.cy} r="2.6" fill="#fff" stroke={color} strokeWidth="1.6">
          <title>{c.sub || `${c.x}: ${c.y}${unit}`}</title>
        </circle>
      ))}
      {points.map((p, i) => (i % xStep === 0 || i === n-1) && (
        <text key={'x'+i} x={xAt(i)} y={H-9} textAnchor="middle" style={{fontSize:9,fill:'#94a3b8'}}>
          {p.x}
        </text>
      ))}
    </svg>
  );
}

// ──────────────────────────────────────────────────────────────
// TrendCharts — disponibilidad diaria (mes actual) + mensual (año actual)
// ──────────────────────────────────────────────────────────────
const MESES_CORTO = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const MESES_LARGO = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function TrendCharts() {
  const [daily,   setDaily]   = useState([]);
  const [monthly, setMonthly] = useState([]);
  const [loaded,  setLoaded]  = useState(false);

  useEffect(() => {
    fetch('/api/history')
      .then(r => r.json())
      .then(d => { if (d.ok) { setDaily(d.daily || []); setMonthly(d.monthly || []); } })
      .catch(() => {})
      .finally(() => setLoaded(true));
  }, []);

  // Fecha actual en zona horaria de Chile
  const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Santiago' }); // YYYY-MM-DD
  const [yStr, mStr] = todayStr.split('-');
  const year = +yStr, month = +mStr;

  // Diario: todos los días del mes actual (eje fijo 1 → fin de mes)
  const dailyMap = {};
  daily.forEach(d => { dailyMap[d.date] = d; });
  const daysInMonth = new Date(year, month, 0).getDate();
  const dailyPts = [];
  for (let day = 1; day <= daysInMonth; day++) {
    const dd = String(day).padStart(2, '0');
    const key = `${yStr}-${mStr}-${dd}`;
    const e = dailyMap[key];
    dailyPts.push({
      x: String(day),
      y: e ? e.pct : null,
      sub: e ? `${key}: ${e.pct}% (${e.online}/${e.total})` : `${key}: sin datos`,
    });
  }

  // Mensual: los 12 meses del año actual (ene → dic)
  const monthlyMap = {};
  monthly.forEach(m => { monthlyMap[m.month] = m; });
  const monthlyPts = [];
  for (let mo = 1; mo <= 12; mo++) {
    const mm = String(mo).padStart(2, '0');
    const key = `${yStr}-${mm}`;
    const e = monthlyMap[key];
    monthlyPts.push({
      x: MESES_CORTO[mo-1],
      y: e ? e.pct : null,
      sub: e ? `${MESES_LARGO[mo-1]} ${year}: ${e.pct}% promedio (${e.days} día${e.days!==1?'s':''})` : `${MESES_LARGO[mo-1]} ${year}: sin datos`,
    });
  }

  const box = { background:'#fff', border:'1px solid #e4e7ec', borderRadius:8, padding:'14px 18px' };
  const titleStyle = { fontSize:12, fontWeight:700, color:'#2d3540', marginBottom:4 };
  const subStyle = { fontSize:10.5, color:'#9ca3af', marginBottom:8 };

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,padding:'12px 20px 0'}}>
      <div style={box}>
        <div style={titleStyle}>Disponibilidad diaria</div>
        <div style={subStyle}>% online por día · {MESES_LARGO[month-1]} {year}</div>
        <LineChart points={loaded ? dailyPts : []} color="#3b9bf2" />
      </div>
      <div style={box}>
        <div style={titleStyle}>Disponibilidad mensual</div>
        <div style={subStyle}>% online promedio por mes · {year}</div>
        <LineChart points={loaded ? monthlyPts : []} color="#9b6dff" />
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// Mini donut (SVG inline, sin dependencias)
// ──────────────────────────────────────────────────────────────
function MiniDonut({ data, title }) {
  const size = 160, stroke = 28, r = (size - stroke) / 2;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * r;
  const totalVal = data.reduce((s, d) => s + d.value, 0) || 1;
  let offset = 0;
  const segs = data.map(d => {
    const dash = (d.value / totalVal) * circ;
    const s = { ...d, dash, offset };
    offset += dash;
    return s;
  });
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
      <div style={{fontSize:12,fontWeight:600,color:'#374151'}}>{title}</div>
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth={stroke}/>
        {segs.map((s,i) => (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={s.color} strokeWidth={stroke}
            strokeDasharray={`${s.dash} ${circ - s.dash}`}
            strokeDashoffset={-s.offset}
            transform={`rotate(-90 ${cx} ${cy})`}/>
        ))}
        <text x={cx} y={cy-4} textAnchor="middle"
          style={{fontSize:22,fontWeight:400,fontFamily:'monospace',fill:'#1e293b'}}>{totalVal}</text>
        <text x={cx} y={cy+14} textAnchor="middle"
          style={{fontSize:9,fill:'#94a3b8',letterSpacing:'0.08em',textTransform:'uppercase'}}>total</text>
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:5,width:'100%',maxWidth:160}}>
        {data.map((d,i) => (
          <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:11}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:10,height:10,borderRadius:2,background:d.color,flexShrink:0}}/>
              <span style={{color:'#6b7280'}}>{d.label}</span>
            </div>
            <span style={{fontFamily:'monospace',fontWeight:700,color:'#374151'}}>{d.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
